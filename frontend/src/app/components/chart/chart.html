<div id="chart-container" class="surface-no-constraints chart-panel">
    <div class="chart-panel-head">
        <i
            class="pi pi-info-circle chart-tip-icon"
            [pTooltip]="chartHint()"
            [tooltipDisabled]="chartHint().length === 0"
            tooltipEvent="hover"
            tooltipPosition="left"
        ></i>
    </div>
    <div class="chart-panel-body">
        @if (data().datasets.length > 0) {
            <p-chart type="bar" [data]="data()" [options]="basicOptions" />
        } @else {
            <i class="pi pi-spinner pi-spin"></i>
        }
    </div>
</div>
